name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ciscout
          POSTGRES_PASSWORD: ciscout
          POSTGRES_DB: ciscout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ciscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - run: go vet ./...

      - run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...
        env:
          GOTOOLCHAIN: local

      - run: go test ./... -race -count=1
        env:
          DATABASE_URL: postgres://ciscout:ciscout@localhost:5432/ciscout?sslmode=disable

      - run: go build ./...
