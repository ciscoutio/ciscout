name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - run: go vet ./...

      - run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...
        env:
          GOTOOLCHAIN: local

      - run: go test ./... -race -count=1

      - run: go build ./...
