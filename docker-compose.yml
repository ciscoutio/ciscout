services:
  postgres:
    image: postgres:16
    # Version pinned per https://fly.io/docs/mpg/ (as of 2026-04-24)
    # Fly.io Managed Postgres supports Postgres 16 for production compatibility
    container_name: ciscout-postgres
    environment:
      POSTGRES_USER: ciscout
      POSTGRES_PASSWORD: ciscout
      POSTGRES_DB: ciscout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciscout"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
